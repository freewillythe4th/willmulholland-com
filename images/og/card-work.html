<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1F1511;--cream:#F2EDE3;--accent:#2563EB;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);
    width:1200px;height:630px;display:flex;align-items:center;justify-content:center;}
  .safe{width:1010px;height:100%;display:flex;flex-direction:column;justify-content:center;}
  .eyebrow{font-size:40px;font-weight:800;color:var(--accent);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:24px;}
  .hero{font-size:116px;line-height:0.94;font-weight:900;letter-spacing:-0.035em;color:var(--ink);}
  .cta{font-size:48px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);margin-top:40px;}
  .cta .arrow{color:var(--accent);}
</style></head>
<body><div class="safe">
  <div class="eyebrow">Portfolio</div>
  <div class="hero">The AI marketing systems I build</div>
  <div class="cta">See the work <span class="arrow">&rarr;</span></div>
</div></body></html>
