<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F1511;
    --cream:#F2EDE3;
    --accent:#2563EB;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink);
    width:1200px;height:630px;
    display:flex;align-items:center;
    padding:70px 60px;
    gap:8px;
    overflow:hidden;
  }
  .col{flex:1 1 54%;display:flex;flex-direction:column;justify-content:center;}
  .eyebrow{font-size:33px;font-weight:800;color:var(--accent);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:20px;}
  .hero{font-size:104px;line-height:0.95;font-weight:900;letter-spacing:-0.035em;color:var(--ink);}
  .cta{font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-0.02em;color:var(--ink);margin-top:34px;}
  .cta .arrow{color:var(--accent);}
  .art{flex:0 0 46%;display:flex;align-items:center;justify-content:center;}
  .art img{width:100%;max-width:600px;height:auto;mix-blend-mode:multiply;}
</style>
</head>
<body>
  <div class="col">
    <div class="eyebrow">Free weekly newsletter</div>
    <div class="hero">Build your<br>marketing<br>brain</div>
    <div class="cta">Read it free <span class="arrow">&rarr;</span></div>
  </div>
  <div class="art">
    <img src="brain-twosides.png" alt="A brain split into business and market halves">
  </div>
</body>
</html>
