<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F1511;
    --cream:#F2EDE3;
    --cream-soft:#EBE5D8;
    --accent:#2563EB;
    --accent-soft:#DBEAFE;
    --accent-deep:#1E3A8A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink);
    width:1200px;height:630px;
    display:flex;flex-direction:column;
    padding:72px 80px;
    position:relative;
    overflow:hidden;
  }
  /* soft brand wash bottom-right */
  .wash{position:absolute;right:-180px;bottom:-220px;width:560px;height:560px;border-radius:50%;
    background:radial-gradient(circle at center, var(--accent-soft) 0%, rgba(219,234,254,0) 70%);}
  .brand{display:flex;align-items:center;gap:14px;}
  .mark{width:34px;height:34px;border-radius:9px;background:var(--ink);
    display:flex;align-items:center;justify-content:center;}
  .mark span{display:block;width:14px;height:14px;border:3px solid var(--cream);transform:rotate(45deg);}
  .brand .wm{font-weight:800;letter-spacing:0.16em;font-size:18px;text-transform:uppercase;color:var(--ink);}
  .body{margin-top:auto;margin-bottom:auto;position:relative;z-index:2;}
  .eyebrow{font-size:30px;font-weight:700;color:var(--ink);opacity:0.62;letter-spacing:-0.01em;margin-bottom:6px;}
  .date{font-size:104px;line-height:0.98;font-weight:900;letter-spacing:-0.03em;color:var(--accent);}
  .lead{font-size:50px;line-height:1.08;font-weight:800;letter-spacing:-0.02em;color:var(--ink);margin-top:18px;max-width:920px;}
  .lead .arrow{color:var(--accent);}
  .foot{display:flex;align-items:center;gap:18px;position:relative;z-index:2;}
  .foot .meta{font-size:24px;font-weight:600;color:var(--ink);opacity:0.7;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--ink);opacity:0.4;}
</style>
</head>
<body>
  <div class="wash"></div>

  <div class="brand">
    <div class="mark"><span></span></div>
    <div class="wm">Intelligent Growth</div>
  </div>

  <div class="body">
    <div class="eyebrow">Free workshop</div>
    <div class="date" id="date">Wed 8 July</div>
    <div class="lead">Build your marketing brain with me <span class="arrow">&rarr;</span></div>
  </div>

  <div class="foot">
    <div class="meta">Live online</div>
    <div class="dot"></div>
    <div class="meta">7pm AEST</div>
    <div class="dot"></div>
    <div class="meta">intelligentgrowth.app/workshop</div>
  </div>
</body>
</html>
